name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"] # Se dispara al hacer push a main
  workflow_dispatch: # Permite correrlo manualmente

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar GitHub Pages para usar Actions
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: github-actions

      # 3️⃣ Subir la carpeta site como artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site # <-- solo la carpeta site/

      # 4️⃣ Desplegar Pages desde artifact
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
