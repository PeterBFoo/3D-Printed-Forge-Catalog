<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Minis</title>

  <style>
    body {
      background: #0e0e0e;
      color: #eee;
      font-family: sans-serif;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-top: 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    input,
    select {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    /* GRID RESPONSIVE REAL */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      /* móvil: 1 card */
      gap: 16px;
    }

    /* tablet */
    @media (min-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* desktop */
    @media (min-width: 1100px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .card {
      background: #1b1b1b;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .card:hover {
      transform: scale(1.02);
      background: #242424;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      display: block;
    }

    .small {
      color: #aaa;
      font-size: 12px;
      margin-top: 4px;
    }

    /* PAGINACIÓN */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 25px;
      margin-bottom: 25px;
    }

    .page-btn {
      background: #1b1b1b;
      border: none;
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* MODAL GALERÍA */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal img {
      max-width: 95%;
      max-height: 75vh;
      border-radius: 12px;
      cursor: pointer;
    }

    .modal-info {
      margin-top: 15px;
      text-align: center;
      color: #ddd;
      max-width: 900px;
      word-break: break-word;
    }

    .modal-title {
      font-size: 20px;
      margin-bottom: 5px;
    }

    .modal-meta {
      color: #aaa;
      font-size: 14px;
    }

    .close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
    }

    /* Fade suave de las cards */
    .card {
      background: #1b1b1b;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.35s ease, transform 0.35s ease;
      opacity: 0;
      transform: translateY(10px);
    }

    /* Cuando ya está visible */
    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Contenedor imagen con skeleton */
    .img-wrapper {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 8px;
      background: #222;
    }

    /* Skeleton shimmer */
    .img-wrapper::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
          #1f1f1f 25%,
          #2a2a2a 37%,
          #1f1f1f 63%);
      background-size: 400% 100%;
      animation: shimmer 1.4s infinite;
      z-index: 1;
    }

    /* Imagen fade-in */
    .card img {
      width: 100%;
      display: block;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.4s ease;
      position: relative;
      z-index: 2;
    }

    .card img.loaded {
      opacity: 1;
    }

    /* Quitar skeleton cuando carga */
    .img-wrapper.loaded::before {
      display: none;
    }

    @keyframes shimmer {
      0% {
        background-position: 100% 0;
      }

      100% {
        background-position: 0 0;
      }
    }

    /* Transición suave de imagen del modal */
    .modal img {
      max-width: 95%;
      max-height: 75vh;
      border-radius: 12px;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    /* Estado oculto para transición */
    .modal img.fade-out {
      opacity: 0;
    }

    /* Estado visible tras cargar */
    .modal img.fade-in {
      opacity: 1;
    }
  </style>
</head>

<body>
  <h1>Catálogo de Minis</h1>

  <div class="controls">
    <input id="search" placeholder="Buscar por nombre o tags">
    <select id="category">
      <option value="">Todas las categorías</option>
    </select>
  </div>

  <div class="pagination">
    <button class="page-btn" id="prevBtnTop">◀</button>
    <div id="pageInfo-top">Página 1 de 1</div>
    <button class="page-btn" id="nextBtnTop">▶</button>
  </div>

  <div class="grid" id="grid"></div>

  <div class="pagination">
    <button class="page-btn" id="prevBtnBottom">◀</button>
    <div id="pageInfo-bottom">Página 1 de 1</div>
    <button class="page-btn" id="nextBtnBottom">▶</button>
  </div>

  <!-- MODAL GALERÍA -->
  <div class="modal" id="modal">
    <div class="close" id="closeModal">✕</div>
    <img id="modalImg" src="">
    <div class="modal-info">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta" id="modalCategory"></div>
      <div class="modal-meta" id="modalPath"></div>
    </div>
  </div>

  <script>
    let DATA = [];
    let filteredData = [];
    let currentPage = 1;
    let currentIndex = 0;
    const pageSize = 40; // óptimo para miles de imágenes

    const grid = document.getElementById("grid");
    const pageInfoTop = document.getElementById("pageInfo-top");
    const pageInfoBottom = document.getElementById("pageInfo-bottom");
    const prevBtnTop = document.getElementById("prevBtnTop");
    const nextBtnTop = document.getElementById("nextBtnTop");
    const prevBtnBottom = document.getElementById("prevBtnBottom");
    const nextBtnBottom = document.getElementById("nextBtnBottom");

    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modalImg");
    const modalTitle = document.getElementById("modalTitle");
    const modalCategory = document.getElementById("modalCategory");
    const modalPath = document.getElementById("modalPath");

    // Cargar índice
    fetch("index.json")
      .then(r => r.json())
      .then(d => {
        DATA = d.map(item => ({
          ...item,
          diskPath: item.diskPath || item.title // fallback si aún no lo añadiste
        }));

        const cats = [...new Set(DATA.map(i => i.category))].sort();
        const sel = document.getElementById("category");

        cats.forEach(c => {
          const o = document.createElement("option");
          o.value = c;
          o.textContent = c;
          sel.appendChild(o);
        });

        applyFilters();
      });

    // Filtros
    document.getElementById("search").addEventListener("input", () => {
      currentPage = 1;
      applyFilters();
    });

    document.getElementById("category").addEventListener("change", () => {
      currentPage = 1;
      applyFilters();
    });

    function applyFilters() {
      const q = document.getElementById("search").value.toLowerCase();
      const cat = document.getElementById("category").value;

      filteredData = DATA.filter(i =>
        (!cat || i.category === cat) &&
        (
          i.title.toLowerCase().includes(q) ||
          (i.tags && i.tags.join(" ").toLowerCase().includes(q))
        )
      );

      render();
    }

    function render() {
      grid.innerHTML = "";

      const totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * pageSize;
      const pageItems = filteredData.slice(start, start + pageSize);

      // Usar fragment evita reflow brusco
      const fragment = document.createDocumentFragment();

      pageItems.forEach((item, index) => {
        const globalIndex = start + index;

        const div = document.createElement("div");
        div.className = "card";

        const wrapper = document.createElement("div");
        wrapper.className = "img-wrapper";

        const img = document.createElement("img");
        img.src = item.thumb;
        img.loading = "lazy";
        img.decoding = "async";

        // Fade-in cuando la imagen esté realmente cargada
        img.onload = () => {
          img.classList.add("loaded");
          wrapper.classList.add("loaded");
        };

        const title = document.createElement("div");
        title.textContent = item.title;

        const cat = document.createElement("div");
        cat.className = "small";
        cat.textContent = item.category;

        wrapper.appendChild(img);
        div.appendChild(wrapper);
        div.appendChild(title);
        div.appendChild(cat);

        div.addEventListener("click", () => {
          openModal(globalIndex);
        });

        fragment.appendChild(div);

        // Animación escalonada (ultra smooth)
        requestAnimationFrame(() => {
          setTimeout(() => {
            div.classList.add("visible");
          }, index * 15); // delay progresivo suave
        });
      });

      grid.appendChild(fragment);

      pageInfoTop.textContent = "Página " + currentPage + " de " + totalPages;
      pageInfoBottom.textContent = "Página " + currentPage + " de " + totalPages;
      prevBtnTop.disabled = currentPage === 1;
      prevBtnBottom.disabled = currentPage === 1;
      nextBtnTop.disabled = currentPage === totalPages;
      nextBtnBottom.disabled = currentPage === totalPages;
    }

    // Paginación compacta
    prevBtnTop.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        render();
      }
    });

    nextBtnTop.addEventListener("click", () => {
      const totalPages = Math.ceil(filteredData.length / pageSize);
      if (currentPage < totalPages) {
        currentPage++;
        render();
      }
    });

    prevBtnBottom.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    nextBtnBottom.addEventListener("click", () => {
      const totalPages = Math.ceil(filteredData.length / pageSize);
      if (currentPage < totalPages) {
        currentPage++;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    // MODAL / GALERÍA
    function openModal(index) {
      currentIndex = index;
      showModalItem();
      modal.style.display = "flex";
    }

    function showModalItem() {
      const item = filteredData[currentIndex];
      if (!item) return;

      const newSrc = item.thumb.replace("thumbs/", "images/");

      // Si es la misma imagen, no hacer nada
      if (modalImg.src.includes(newSrc)) return;

      // Fade out primero
      modalImg.classList.add("fade-out");
      modalImg.classList.remove("fade-in");

      // Precargar imagen en background (clave para suavidad)
      const preloader = new Image();
      preloader.src = newSrc;

      preloader.onload = () => {
        // Cambiar src SOLO cuando esté cargada
        modalImg.src = newSrc;

        // Forzar reflow para que la transición sea consistente
        modalImg.offsetHeight;

        // Fade in suave
        modalImg.classList.remove("fade-out");
        modalImg.classList.add("fade-in");
      };

      // Actualizar metadatos (esto sí puede ser inmediato)
      modalTitle.textContent = item.title;
      modalCategory.textContent = "Categoría: " + item.category;
      modalPath.textContent = "Ruta en disco: " + (item.diskPath || "Desconocida");
    }

    // Click en imagen = siguiente (galería)
    modalImg.addEventListener("click", () => {
      if (currentIndex < filteredData.length - 1) {
        currentIndex++;
        showModalItem();
      }
    });

    // Flechas teclado galería
    document.addEventListener("keydown", (e) => {
      if (modal.style.display !== "flex") return;

      if (e.key === "ArrowRight" && currentIndex < filteredData.length - 1) {
        currentIndex++;
        showModalItem();
      }
      if (e.key === "ArrowLeft" && currentIndex > 0) {
        currentIndex--;
        showModalItem();
      }
      if (e.key === "Escape") {
        modal.style.display = "none";
      }
    });

    // Cerrar modal
    document.getElementById("closeModal").addEventListener("click", () => {
      modal.style.display = "none";
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.style.display = "none";
      }
    });
  </script>
</body>

</html>
