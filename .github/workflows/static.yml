name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"] # Cada push a main dispara el workflow
  workflow_dispatch: # También se puede ejecutar manualmente

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true # importante para que se bajen los archivos grandes trackeados por Git LFS

      # 2️⃣ Configurar Pages para usar Actions
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: github-actions

      # 3️⃣ Subir artifact de la carpeta site (incluyendo images/)
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site # <-- aquí se sube todo: HTML, JSON, thumbs, pages, images

      # 4️⃣ Desplegar Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
